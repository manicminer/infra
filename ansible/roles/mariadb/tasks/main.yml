---

- ansible.builtin.deb822_repository:
    name: mariadb
    types: deb
    uris: "https://deb.mariadb.org/{{ mariadb_version }}/{{ ansible_facts['distribution'] | lower }}"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: main
    architectures: amd64
    signed_by: "https://mariadb.org/mariadb_release_signing_key.pgp"

- ansible.builtin.apt:
    name:
      - mariadb-server
      - python3-mysqldb
    state: latest
    update_cache: true

- ansible.builtin.service:
    name: mariadb
    enabled: true
    state: started

- community.mysql.mysql_user:
    name: root
    host: "{{ item }}"
    password: "{{ mariadb_root_password }}"
    check_implicit_admin: true
  loop:
    - localhost
    - 127.0.0.1

- ansible.builtin.copy:
    dest: /root/.my.cnf
    owner: root
    group: root
    mode: '0400'
    content: |
      [client]
      password = {{ mariadb_root_password }}

- ansible.builtin.lineinfile:
    path: "/etc/mysql/mariadb.conf.d/50-server.cnf"
    regexp: "^#?{{ item.key }}([ ]*)=([ ]*)"
    line: "{{ item.key }} = {{ item.value }}"
    backrefs: true
    firstmatch: true
  loop: "{{ config | dict2items }}"
  notify: restart-mariadb
  vars:
    config:
      bind-address: "*"

- ansible.builtin.cron:
    name: mariadb-backup
    minute: "30"
    hour: "2"
    job: /root/bin/mariadb-backup.sh
    state: present

