---
- hosts: postgres
  roles:
    - role: postgres
      tags: postgres


- hosts: postgres2
  roles:
    - role: postgres
      tags: postgres
      postgres_allow_networks:
        - 10.150.0.0/24
        - 2a01:4f9:5a:2aad::/64


- hosts: postgres,postgres2
  roles:
    - role: borg
      tags: borg
      scripts:
        - postgres

    - role: tls
      tags: tls

    - role: letsencrypt-certs
      tags: letsencrypt-certs

    - role: nginx
      tags: nginx
      site_name: pgadmin4
      site_template: pgadmin4.conf.j2
      uwsgi_sock: "unix:///run/pgadmin4/pgadmin4.sock"


- hosts: postgres
  tags: postgres
  become: yes
  become_user: postgres
