---
- apt:
    name:
      - apcupsd
      - ucspi-tcp
    state: present

- template:
    src: apcupsd.conf.j2
    dest: /etc/apcupsd/apcupsd.conf
  notify: restart-apcupsd

- service:
    name: apcupsd
    enabled: yes
    state: started

- copy:
    src: usvnutwrapper.sh
    dest: /usr/local/bin/usvnutwrapper.sh
    mode: '0755'
  notify: restart-nutwrapper

- template:
    src: nutwrapper.service.j2
    dest: /etc/systemd/system/nutwrapper.service
  notify: restart-nutwrapper
  register: nutwrapper_service

- shell:
    cmd: systemd daemon-reload
  when: nutwrapper_service.changed

- service:
    name: nutwrapper
    enabled: yes
    state: started

