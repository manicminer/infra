---
- hosts: europa
  roles:
    - role: letsencrypt-certs
      tags: letsencrypt-certs

    - role: postfix
      tags: postfix

    - role: clamav
      tags: clamav
      clamav_scan_paths:
        - /home
        - /opt

    - role: docker
      tags: docker

    - role: maxmind
      tags: maxmind

    - role: mongodb
      tags: mongodb
      mongodb_expired_signing_key: true

    - role: rabbitmq
      tags: rabbitmq

    - role: postgres
      tags: postgres


- hosts: europa
