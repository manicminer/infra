---
- hosts: nextcloud
  roles:
    - role: tls
      tags: tls

    - role: borg
      tags: borg
      scripts:
        - nextcloud

    - role: redis
      tags: redis

    - role: php
      tags: php
      php_settings:
        max_execution_time: 3600
        max_input_time: 3600
        post_max_size: 1024M
        upload_max_filesize: 1024M
      php_version: 8.3

    - role: apache2
      tags: apache2

    - role: nextcloud
      tags: nextcloud

# vim: set ft=yaml ts=2 sts=2 sw=2 et:
