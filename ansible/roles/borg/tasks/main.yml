---
- assert:
    that:
      - borg_archive_root != ""
      - borg_passphrase != ""

#- ansible.builtin.apt_repository:
#    repo: "ppa:costamagnagianfranco/borgbackup"
#    state: present
#    update_cache: yes

- ansible.builtin.apt:
    name: borgbackup
    state: present

- ansible.builtin.template:
    src: borg-env.j2
    dest: /root/.borg-env
    mode: '0600'

- ansible.builtin.template:
    src: nextcloud-backup.sh.j2
    dest: /root/bin/nextcloud-backup.sh
    mode: '0700'
  when: "'nextcloud' in scripts"

- ansible.builtin.template:
    src: wordpress-backup.sh.j2
    dest: /root/bin/wordpress-backup.sh
    mode: '0700'
  when: "'wordpress' in scripts"

