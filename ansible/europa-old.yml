- hosts: europa
  roles:

    - role: echoip
      tags: echoip

    - role: heimdall
      tags: heimdall

    - role: mattermost
      tags: mattermost
      server_name: m.manicminer.io

    - role: openproject
      tags: openproject
      server_name: op.manicminer.io

    - role: opensign
      tags: opensign
      server_name: os.manicminer.io

    - role: spacebin
      tags: spacebin

    - role: taiga
      tags: taiga


- hosts: europa
  tags: caddy
  roles:

    - role: caddy
      tags: caddy
      enable_fqdn_static: true

    - role: caddy-proxy
      tags: echoip
      site_name: echoip
      server_name: ip.manicminer.io
      proxy_port: 9005
      allow_http: true

    - role: caddy-proxy
      tags: echoip
      site_name: echoip4
      server_name: ip4.manicminer.io
      proxy_port: 9005
      allow_http: true

    - role: caddy-proxy
      tags: echoip
      site_name: echoip6
      server_name: ip6.manicminer.io
      proxy_port: 9005
      allow_http: true

    - role: caddy-proxy
      tags: heimdall
      site_name: heimdall
      server_name: home.manicminer.io
      proxy_port: 9004

    - role: caddy-proxy
      tags: mattermost
      site_name: mattermost
      server_name: m.manicminer.io
      proxy_port: 8065

    - role: caddy-proxy
      tags: openproject
      site_name: openproject
      server_name: op.manicminer.io
      proxy_port: 6000

    - role: caddy-proxy
      tags: opensign
      site_name: opensign
      server_name: os.manicminer.io
      proxy_port: 9003
      proxy_paths:
        '/app': "localhost:9002"

    - role: caddy-proxy
      tags: rabbitmq
      site_name: rabbitmq
      proxy_port: 15672
      server_port: 444

    - role: caddy-proxy
      tags: spacebin
      site_name: spacebin
      server_name: sb.manicminer.io
      proxy_port: 9001

    - role: caddy-proxy
      tags: taiga
      site_name: taiga
      server_name: taiga.manicminer.io
      proxy_port: 9000

